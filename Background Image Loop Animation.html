<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- https://www.youtube.com/watch?v=abo0x86sQb4&list=PL5e68lK9hEzcZLltZrc3NDlKWS3XygchY&index=5 -->
    <title>Background Image Loop Animation</title>
</head>
<body>
    <section>
        <h1>Hello world !</h1>
        <!-- <img src=""/>  -->
        <div class="banner">
            <div class="blocks"></div>
        </div>
    </section>

    <style>
        * {
            margin: 0;
            padding: 0;
        }
        img {
            width: 100%;
            height: 38rem;
        }


        section {
            position: relative;
            width: 100%;
            height: 100vh;
            background: #333;
        }
        section h1 {
            position: relative;
            width: 100%;
            height: 100vh;
            text-align: center;
            line-height: 100vh;
            font-size: 10vw;
            color: white;
            font-weight: 700;
        }
        .banner {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            display: flex;
            flex-wrap: wrap;
        }



        .banner .blocks {
            position: relative;
            display: block;
            width: 5vw;
            height: 5vw;
            color: white;
            animation: animate 0.75s ease-in-out forwards;   
        }
        @keyframes animate {
            0% { opacity: 0;
                 transform: scale(0) translateY(1000px);
            }

            50% { opacity: 1;
                  background: url(https://media.licdn.com/dms/image/v2/D5612AQFMxThwQn7HZg/article-cover_image-shrink_720_1280/article-cover_image-shrink_720_1280/0/1697274440798?e=2147483647&v=beta&t=QLEHZgio8uRKebsNCrjEdh3rOvVmSUa7dSYgzCPBxBo);
                  background-position: center;
                  background-attachment: fixed;
            }

            100% { opacity: 1;
                   transform: scale(1) translateY(0px);
                   background: url(https://media.licdn.com/dms/image/v2/D5612AQFMxThwQn7HZg/article-cover_image-shrink_720_1280/article-cover_image-shrink_720_1280/0/1697274440798?e=2147483647&v=beta&t=QLEHZgio8uRKebsNCrjEdh3rOvVmSUa7dSYgzCPBxBo);
                   background-position: center;
                   background-attachment: fixed;
                }
        }
    </style>

    <script>
        const banner = document.getElementsByClassName('banner')[0];
        const blocks = document.getElementsByClassName('blocks');

        for (var i = 1; i < 400; i++) {
            banner.innerHTML += "<div class='blocks'></div>";
            blocks[i].style.animationDelay = `${i*0.05}s`;
        }
    </script>
</body>
</html>
